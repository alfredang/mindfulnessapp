name: MindfulnessPractice
options:
  bundleIdPrefix: com.alfredang
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "5"
targets:
  MindfulnessPractice:
    type: application
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alfredang.mindfulnesspractice
        TARGETED_DEVICE_FAMILY: "1"
    sources:
      - path: MindfulnessPractice/Sources
      - path: MindfulnessPractice/Resources/audio
      - path: MindfulnessPractice/Resources/Assets.xcassets
    info:
      path: MindfulnessPractice/Info.plist
      properties:
        CFBundleDisplayName: Mindfulness Practice
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        NSAppleMusicUsageDescription: "Choose a song from your music library to play gently in the background during your meditation."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - audio

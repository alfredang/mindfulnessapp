name: MindfulnessPractice
options:
  bundleIdPrefix: com.alfredang
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  MindfulnessPractice:
    type: application
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alfredang.mindfulnesspractice
        TARGETED_DEVICE_FAMILY: "1"
    sources:
      - path: MindfulnessPractice/Sources
      - path: MindfulnessPractice/Resources/MindfulnessPractice.mp4
      - path: MindfulnessPractice/Resources/practice-mountain.jpg
      - path: MindfulnessPractice/Resources/transcript.txt
      - path: MindfulnessPractice/Resources/Assets.xcassets
    info:
      path: MindfulnessPractice/Info.plist
      properties:
        CFBundleDisplayName: Mindfulness
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
